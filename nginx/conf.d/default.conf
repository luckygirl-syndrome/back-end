server {
    listen 80;
    listen [::]:80;
    server_name ttobaba.pyeonch.com;
    server_tokens off;

    # Let's Encrypt 인증서 발급/갱신용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ttobaba.pyeonch.com;
    server_tokens off;

    # ── SSL 인증서 ──
    ssl_certificate     /etc/letsencrypt/live/ttobaba.pyeonch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ttobaba.pyeonch.com/privkey.pem;

    # ── SSL 보안 설정 ──
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── 보안 헤더 ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # ── 업로드 크기 제한 ──
    client_max_body_size 50M;

    # ── FastAPI 리버스 프록시 ──
    location / {
        proxy_pass         http://app:8001;
        proxy_http_version 1.1;

        # WebSocket 지원
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 원본 클라이언트 정보 전달
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정 (AI 추론 등 긴 요청 대비)
        proxy_read_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;

        proxy_redirect off;
    }
}
