version: "3.8"

services:
  # ── Nginx (리버스 프록시 + SSL 종료) ──
  nginx:
    image: nginx:1.25-alpine
    container_name: ttobaba-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ttobaba-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ── Certbot (SSL 인증서 자동 갱신) ──
  certbot:
    image: certbot/certbot:latest
    container_name: ttobaba-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - ttobaba-network

  # ── FastAPI 백엔드 ──
  app:
    build: .
    image: ttobaba-backend:latest
    container_name: ttobaba-backend
    expose:
      - "8001"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SELENIUM_URL: http://selenium:4444/wd/hub
    depends_on:
      redis:
        condition: service_healthy
      selenium:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    networks:
      - ttobaba-network

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: ttobaba-selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
    networks:
      - ttobaba-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
    - "6379:6379"
    container_name: ttobaba-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    networks:
      - ttobaba-network

networks:
  ttobaba-network:
    driver: bridge
